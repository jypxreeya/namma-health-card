services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: health_card_backend
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - DIRECT_URL=${DIRECT_URL}
      - JWT_SECRET=${JWT_SECRET:-super_secret_jwt_key_please_change_in_production}
      - SEED_ENV=${SEED_ENV:-dev}
    restart: unless-stopped
